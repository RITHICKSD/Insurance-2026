<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — IST Insurance</title>
  <link rel="icon" href="favicon.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="styles.css" />
  <style>
    :root {
      --auth-bg: #fffbf2; /* matches the cream background in reference */
      --auth-border: #f9e1a1;
      --auth-card: #fff;
      --auth-text: var(--forest);
      --auth-sub: #8b5e3c;
      --auth-input-bg: #fff;
    }

    [data-theme="dark"] {
      --auth-bg: #05140d;
      --auth-border: rgba(201,168,76,0.3);
      --auth-card: #0a2116;
      --auth-text: #e0f2e9;
      --auth-sub: #a3b8ad;
      --auth-input-bg: #123d29;
    }

    body {
      background: var(--auth-bg);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
      margin: 0;
      transition: background 0.3s;
    }

    .auth-lang-abs {
      position: absolute;
      top: 20px;
      right: 20px;
      z-index: 10;
    }

    [dir=rtl] .auth-lang-abs {
      right: auto;
      left: 20px;
    }

    .auth-container {
      width: 100%;
      max-width: 480px;
      background: var(--auth-card);
      border: 1.5px solid var(--auth-border);
      border-radius: 40px;
      padding: 48px 40px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
      position: relative;
      transition: background 0.3s, border-color 0.3s;
    }

    .auth-logo {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin-bottom: 24px;
      text-decoration: none;
    }

    .logo-text {
      display: flex;
      flex-direction: column;
      line-height: 1.1;
    }

    .logo-text .lt1 {
      font-family: var(--ff-title);
      font-size: 1.6rem;
      font-weight: 700;
      color: var(--auth-text);
      letter-spacing: 2px;
    }

    .logo-text .lt2 {
      font-size: 0.75rem;
      font-weight: 600;
      color: #a67c2e;
      text-transform: uppercase;
      letter-spacing: 3px;
      margin-top: 2px;
    }

    .auth-header {
      text-align: center;
      margin-bottom: 32px;
    }

    .auth-header p {
      color: var(--auth-sub);
      font-size: 1.05rem;
      font-weight: 500;
    }

    .form-group {
      margin-bottom: 24px;
    }

    .form-label {
      display: block;
      font-size: 0.95rem;
      font-weight: 700;
      color: var(--auth-text);
      margin-bottom: 10px;
    }

    .form-input {
      width: 100%;
      padding: 14px 20px;
      border: 1.5px solid var(--auth-border);
      border-radius: 12px;
      font-family: var(--ff-body);
      font-size: 1rem;
      color: var(--auth-text);
      transition: border-color 0.3s, box-shadow 0.3s, background 0.3s;
      background: var(--auth-input-bg);
    }

    .form-input:focus {
      outline: none;
      border-color: var(--gold);
      box-shadow: 0 0 0 4px rgba(201, 168, 76, 0.1);
    }

    .form-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 32px;
      font-size: 0.9rem;
    }

    .form-checkbox {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      color: var(--auth-sub);
      font-weight: 500;
    }

    .form-checkbox input {
      width: 18px;
      height: 18px;
      cursor: pointer;
      accent-color: var(--gold);
    }

    .forgot-link {
      color: #008080;
      font-weight: 600;
      text-decoration: none;
    }

    .btn-auth {
      width: 100%;
      padding: 16px;
      background: linear-gradient(135deg, var(--gold), var(--gold-light));
      color: #000;
      font-weight: 800;
      font-size: 1.1rem;
      border: none;
      border-radius: 40px;
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 24px;
      box-shadow: 0 4px 15px rgba(201, 168, 76, 0.2);
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .btn-auth:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(31, 163, 122, 0.3);
    }

    .auth-or {
      display: flex;
      align-items: center;
      text-align: center;
      margin-bottom: 24px;
      color: var(--gold);
      font-size: 0.85rem;
      font-weight: 600;
    }

    .auth-or::before, .auth-or::after {
      content: '';
      flex: 1;
      border-bottom: 1.5px solid var(--auth-border);
    }

    .auth-or:not(:empty)::before { margin-right: 15px; }
    .auth-or:not(:empty)::after { margin-left: 15px; }

    .btn-social {
      width: 100%;
      padding: 12px;
      background: var(--auth-card);
      border: 1.5px solid var(--auth-border);
      border-radius: 12px;
      font-family: var(--ff-body);
      font-size: 0.95rem;
      font-weight: 600;
      color: var(--auth-text);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin-bottom: 12px;
      cursor: pointer;
      transition: background 0.3s;
    }

    .btn-social:hover {
      background: #fffaf0;
    }

    .btn-social svg {
      width: 20px;
      height: 20px;
    }

    .auth-footer {
      text-align: center;
      margin-top: 32px;
      font-size: 0.95rem;
      color: var(--auth-sub);
      font-weight: 500;
    }

    .auth-footer a {
      color: #008080;
      font-weight: 700;
      text-decoration: none;
    }

    /* Mobile adjustments */
    @media (max-width: 480px) {
      .auth-container {
        padding: 40px 24px;
        border-radius: 24px;
      }
      .auth-logo-text .t1 { font-size: 1.4rem; }
    }
  </style>
</head>
<body class="no-global-components">

  <div class="auth-container">
    <div class="auth-lang-abs" style="display:flex; gap:10px;">
      <button class="lang-toggle" id="themeToggle" aria-label="Toggle Dark/Light Mode">
        <span data-icon="moon" style="width:18px;height:18px;display:flex"></span>
      </button>
      <button class="lang-toggle" id="langToggle" aria-label="Toggle RTL/LTR">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
          <circle cx="12" cy="12" r="10"/><path d="M2 12h20M12 2a15 15 0 010 20M12 2a15 15 0 000 20"/>
        </svg>
      </button>
    </div>

    <a href="index.html" class="auth-logo">
      <svg class="logo-icon" viewBox="0 0 44 44" fill="none" xmlns="http://www.w3.org/2000/svg" style="width:50px; height:50px;">
        <path d="M22 3L40 11V23C40 33 32 40.5 22 43C12 40.5 4 33 4 23V11Z" fill="#0A2E1F"/>
        <path d="M22 7L36 13.5V23C36 31 29.5 37 22 39.5C14.5 37 8 31 8 23V13.5Z" fill="none" stroke="#C9A84C" stroke-width="1"/>
        <path d="M15 22l5 5 9-9" stroke="#C9A84C" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <div class="logo-text">
        <span class="lt1">IST</span>
        <span class="lt2">Insurance Group</span>
      </div>
    </a>

    <div class="auth-header">
      <p>Welcome back! Please login to your account</p>
    </div>

    <form action="user-dashboard.html">
      <div class="form-group">
        <label class="form-label">Email Address</label>
        <input type="email" class="form-input" placeholder="john@example.com" required />
      </div>

      <div class="form-group">
        <label class="form-label">Password</label>
        <input type="password" class="form-input" placeholder="Enter your password" required />
      </div>

      <div class="form-meta">
        <label class="form-checkbox">
          <input type="checkbox"> Remember me
        </label>
        <a href="#" class="forgot-link">Forgot password?</a>
      </div>

      <button type="submit" class="btn-auth">Login</button>
    </form>

    <div class="auth-or">OR</div>

    <button class="btn-social">
      <svg viewBox="0 0 24 24" fill="currentColor">
        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/>
        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
      </svg>
      Continue with Google
    </button>

    <button class="btn-social">
      <svg viewBox="0 0 24 24" fill="currentColor">
        <path d="M22 12c0-5.52-4.48-10-10-10S2 6.48 2 12c0 4.99 3.65 9.12 8.44 9.88v-6.99H7.9V12h2.54V9.41c0-2.51 1.49-3.89 3.77-3.89 1.09 0 2.23.19 2.23.19v2.46h-1.26c-1.24 0-1.63.77-1.63 1.56V12h2.77l-.44 2.89h-2.33v6.99C18.35 21.12 22 16.99 22 12z"/>
      </svg>
      Continue with Facebook
    </button>

    <div class="auth-footer">
      Don't have an account? <a href="register.html">Register here</a>
    </div>
  </div>

  <script src="icons.js"></script>
  <script>
    // RTL Toggle Logic
    const dir = localStorage.getItem('IST-dir') || 'ltr';
    document.documentElement.setAttribute('dir', dir);

    document.getElementById('langToggle').addEventListener('click', () => {
      const current = document.documentElement.getAttribute('dir');
      const next = current === 'ltr' ? 'rtl' : 'ltr';
      document.documentElement.setAttribute('dir', next);
      localStorage.setItem('IST-dir', next);
    });

    /* Theme Toggle */
    const theme = localStorage.getItem('IST-theme') || 'light';
    document.documentElement.setAttribute('data-theme', theme);
    
    function updateThemeIcon(t) {
      const btn = document.getElementById('themeToggle');
      if (!btn) return;
      const iconSpan = btn.querySelector('span[data-icon]');
      if (iconSpan) {
        const iconName = t === 'light' ? 'moon' : 'sun';
        iconSpan.setAttribute('data-icon', iconName);
        if (typeof ISTIcons !== 'undefined' && ISTIcons[iconName]) {
          iconSpan.innerHTML = ISTIcons[iconName];
        }
      }
    }
    updateThemeIcon(theme);

    document.getElementById('themeToggle').addEventListener('click', () => {
      const current = document.documentElement.getAttribute('data-theme');
      const next = current === 'light' ? 'dark' : 'light';
      document.documentElement.setAttribute('data-theme', next);
      localStorage.setItem('IST-theme', next);
      updateThemeIcon(next);
    });
  </script>
</body>
</html>
